services:
  glpi-mcp:
    build:
      context: .
      dockerfile: Dockerfile

    image: glpi-mcp:0.1.0
    container_name: glpi-mcp
    restart: unless-stopped

    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
      MCP_BEARER_TOKEN: "${MCP_BEARER_TOKEN}"

      MARIADB_HOST: "${MARIADB_HOST}"
      MARIADB_PORT: "${MARIADB_PORT:-3306}"
      MARIADB_DATABASE: "${MARIADB_DATABASE}"
      MARIADB_USER: "${MARIADB_USER}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
      MARIADB_CONNECT_TIMEOUT: "${MARIADB_CONNECT_TIMEOUT:-10}"
      MARIADB_QUERY_TIMEOUT: "${MARIADB_QUERY_TIMEOUT:-10}"

    ports:
      - "18274:8000"

    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8000/health',
          timeout=3)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
